name: CI

on:
  push:
    branches: 
        - main
    paths-ignore:
        - "helm/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.5'
      - name: Build
        run: go build -o go-web-app .

      - name: Test
        run: go test -v ./...
   
  code_quaility:
    runs-on: ubuntu-latest
    
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Run golangci-lint
          uses: golangci/golangci-lint-action@v6
          with:
            version: v1.56.2
    push:
        runs-on: ubuntu-latest

        needs: build

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/go-web-app:${{ github.run_id}}
        update-newtag-in-helm-chart:
            runs-on: ubuntu-latest

            needs: push

            steps:
                - name: Checkout repository
                  uses: actions/checkout@v4
                  with:
                    token: ${{ secrets.GITHUB_TOKEN }}


                - name: Update image tag in Helm chart
                  run: |
                    sed -i "s/tag: .*/tag: v${{ github.run_id }}/" helm/go-web-app-chart/values.yaml

                - name: Commit and push changes
                  run: |
                    git config --global user.name "armansheikhhosseini"
                    git config --global user.email "thearmansh@gmail.com"
                    git add helm/go-web-app-chart/values.yaml
                    git commit -m "Update image tag to v${{ github.run_id }}"
                    git push 